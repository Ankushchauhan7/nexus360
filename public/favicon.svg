<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background: deep dark navy -->
  <rect width="512" height="512" rx="96" fill="#05080F"/>

  <!-- Outer diamond ring (rotated square) -->
  <rect x="156" y="156" width="200" height="200" rx="8"
        transform="rotate(45 256 256)"
        fill="none" stroke="#00C8F0" stroke-width="16" opacity="0.35"/>

  <!-- Middle diamond ring -->
  <rect x="186" y="186" width="140" height="140" rx="6"
        transform="rotate(45 256 256)"
        fill="none" stroke="#00C8F0" stroke-width="10" opacity="0.6"/>

  <!-- Inner filled diamond (core) -->
  <rect x="220" y="220" width="72" height="72" rx="4"
        transform="rotate(45 256 256)"
        fill="#00C8F0"/>

  <!-- Glow center dot -->
  <circle cx="256" cy="256" r="14" fill="#05080F"/>
  <circle cx="256" cy="256" r="8" fill="#00C8F0" opacity="0.9"/>

  <!-- Four corner accent dots on outer ring -->
  <!-- Top -->
  <circle cx="256" cy="116" r="6" fill="#00C8F0" opacity="0.7"/>
  <!-- Bottom -->
  <circle cx="256" cy="396" r="6" fill="#00C8F0" opacity="0.7"/>
  <!-- Left -->
  <circle cx="116" cy="256" r="6" fill="#00C8F0" opacity="0.7"/>
  <!-- Right -->
  <circle cx="396" cy="256" r="6" fill="#00C8F0" opacity="0.7"/>

  <!-- Subtle outer glow ring -->
  <rect x="136" y="136" width="240" height="240" rx="10"
        transform="rotate(45 256 256)"
        fill="none" stroke="#00C8F0" stroke-width="4" opacity="0.12"/>
</svg>
